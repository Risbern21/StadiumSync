server {
    # Cloud Run expects the container to listen on the port specified by $PORT,
    # which defaults to 8080. 
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # This is critical for Single Page Applications (SPAs) like React Router.
        # It forwards any unknown route requests back to index.html.
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets aggressively
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
